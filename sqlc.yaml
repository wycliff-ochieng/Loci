version: "2"
sql:
  - engine: "postgresql"
    queries: "internal/store/queries/"
    schema: "internal/store/schema/"
    #database:
    #  uri: "postgresql://loci_user:yourpassword@localhost:5432/loci?sslmode=disable"
    gen:
      go:
        package: "sqlc"
        out: "sqlc"
        sql_package: "pgx/v5"
        overrides:
          - db_type: "uuid"
            go_type: "github.com/google/uuid.UUID"
          - db_type: "timestamptz"
            go_type: "time.Time"
          # Override for TEXT columns that can be NULL
          - db_type: "text"
            go_type: "string"
            nullable: true # This will generate *string